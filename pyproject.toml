[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "spindynam"
version = "0.1.0"
description = "Coupled Spin-Lattice Dynamics for ASE"
authors = [
    { name = "Antigravity", email = "antigravity@example.com" }
]
license = { text = "BSD-3-Clause" }
dependencies = [
    "ase>=3.22.0",
    "numpy",
]
readme = "README.md"
requires-python = ">=3.8"

[project.scripts]
spin-dynamics-run = "spindynam.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["spindynam"]
